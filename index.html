<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - CrediFlow</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <img src="img/logo.svg" alt="Logo CrediFlow">
            </div>
            <h2 style="text-align: center; margin-bottom: 20px;">CrediFlow</h2>
            <p style="text-align: center; color: #64748b; margin-bottom: 20px;">Ingresa tus credenciales para continuar</p>
            
            <form id="form-login">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Ingresar al Sistema</button>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
